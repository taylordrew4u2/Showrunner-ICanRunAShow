<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="I Can Run A Show">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15171c"/>
      <stop offset="1" stop-color="#0c0d10"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8cf93"/>
      <stop offset="1" stop-color="#b89243"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect x="7" y="7" width="498" height="498" rx="110" fill="none" stroke="#b89243" stroke-opacity="0.28" stroke-width="6"/>
  <!-- timer / cue ring (open arc) -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#gold)" stroke-width="26"
          stroke-linecap="round" stroke-dasharray="760 182" transform="rotate(135 256 256)"/>
  <!-- play triangle: "run the show" -->
  <path d="M214 176 L214 336 L346 256 Z" fill="url(#gold)"/>
</svg>
