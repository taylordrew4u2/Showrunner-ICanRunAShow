name: Cleanup stale claude branches
on:
  push:
    paths:
      - '.github/workflows/cleanup-stale-claude-branches.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged claude/* branches
        uses: actions/github-script@v7
        with:
          script: |
            const stale = [
              'claude/bento-layout',
              'claude/dark-no-emoji',
              'claude/hopeful-dirac-iTDi8',
              'claude/wonderful-pasteur-jYGkU'
            ];
            for (const branch of stale) {
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${branch}`
                });
                core.info(`Deleted ${branch}`);
              } catch (e) {
                core.warning(`Could not delete ${branch}: ${e.message}`);
              }
            }
